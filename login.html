<!DOCTYPE html>
<html>
<head>
<title>PinkFlow Login</title>
<link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-pink-100 min-h-screen flex justify-center items-center">

<div class="bg-white p-8 rounded-3xl shadow-xl w-96">

<h1 class="text-3xl font-bold text-center text-pink-500 mb-6">
🎀 PinkFlow
</h1>

<input
id="email"
type="email"
placeholder="Email"
class="w-full border p-3 rounded-xl mb-3">

<input
id="password"
type="password"
placeholder="Password"
class="w-full border p-3 rounded-xl mb-4">

<button
id="signupBtn"
class="w-full bg-pink-400 text-white p-3 rounded-xl mb-2">
Create Account
</button>

<button
id="loginBtn"
class="w-full bg-purple-400 text-white p-3 rounded-xl">
Login
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

</body>
</html>
